<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Bubble Mask Editor</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app">
      <section class="controls" aria-label="Editor controls">
        <label class="control color-control">
          <span>Mask Color</span>
          <input id="maskColor" type="color" value="#fff2dc">
        </label>

        <label class="control range-control">
          <span>
            Bubble Diameter
            <output id="radiusOutput" for="bubbleRadius">120px</output>
          </span>
          <input id="bubbleRadius" type="range" min="20" max="300" value="120">
        </label>

        <button id="resetButton" type="button">Reset</button>
      </section>

      <section class="canvas-shell" aria-label="Canvas editor">
        <input id="imageInput" class="visually-hidden-file" type="file" accept="image/*">
        <canvas id="editorCanvas" width="960" height="640">
          Your browser does not support HTML5 Canvas.
        </canvas>
        <button id="emptyState" class="empty-state" type="button">Upload Image</button>
      </section>
    </main>

    <aside class="orientation-warning" aria-live="polite">
      <p>Rotate your phone back to portrait mode.</p>
    </aside>

    <script src="app.js"></script>
  </body>
</html>
